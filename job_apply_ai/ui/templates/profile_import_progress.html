<!DOCTYPE html>
<html>
<head>
    <title>Importing CV Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1220;
            min-height: 100vh;
        }
        .progress-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .progress-card {
            width: min(640px, 100%);
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }
        .progress-header {
            background: linear-gradient(135deg, #6610f2 0%, #0d6efd 100%);
            color: white;
            padding: 1.75rem 2rem;
        }
        .progress-body { padding: 2rem; }
        .progress-bar-wrap {
            height: 12px;
            background: #e9ecef;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6610f2, #0d6efd);
            transition: width 0.45s ease;
        }
    </style>
</head>
<body>
    <div class="progress-shell">
        <div class="progress-card">
            <div class="progress-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="fs-2"><i class="fas fa-file-import"></i></div>
                    <div>
                        <h1 class="h3 mb-1">Importing CV Profile</h1>
                        <p class="mb-0 opacity-75">Extracting details from your uploaded CV</p>
                    </div>
                </div>
            </div>
            <div class="progress-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong id="progress-label">Starting…</strong>
                    <span id="progress-percent" class="text-muted">0%</span>
                </div>
                <div class="progress-bar-wrap mb-3">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <p id="progress-message" class="text-muted mb-0">Reading your CV…</p>
                <div id="error-panel" class="alert alert-danger mt-4 d-none" role="alert"></div>
                <div class="mt-4">
                    <a href="{{ back_url }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const taskId = {{ task_id|tojson }};
        const statusUrl = {{ status_url|tojson }};
        const completeUrl = {{ complete_url|tojson }};
        const backUrl = {{ back_url|tojson }};
        let pollTimer = null;

        function updateUi(data) {
            document.getElementById('progress-label').textContent = data.message || 'Working…';
            document.getElementById('progress-message').textContent = data.message || '';
            document.getElementById('progress-percent').textContent = `${data.percent || 0}%`;
            document.getElementById('progress-bar').style.width = `${data.percent || 0}%`;
        }

        async function pollStatus() {
            const response = await fetch(statusUrl);
            if (response.status === 404) {
                clearInterval(pollTimer);
                showError('Import session was lost. Please try again.');
                return;
            }

            const data = await response.json();
            updateUi(data);

            if (data.status === 'complete') {
                clearInterval(pollTimer);
                window.location.href = completeUrl;
                return;
            }

            if (data.status === 'error') {
                clearInterval(pollTimer);
                showError(data.error || data.message || 'CV import failed.');
            }
        }

        function showError(message) {
            const panel = document.getElementById('error-panel');
            panel.textContent = message;
            panel.classList.remove('d-none');
        }

        pollTimer = setInterval(pollStatus, 900);
        pollStatus();
    </script>
</body>
</html>

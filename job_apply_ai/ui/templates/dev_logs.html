<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Developer Logs — HermesHire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding-top: 30px;
            padding-bottom: 50px;
            color: #343a40;
        }
        .page-header {
            background: linear-gradient(135deg, #212529 0%, #495057 100%);
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            color: white;
        }
        .log-table-wrap {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .log-row {
            border-bottom: 1px solid #eef2f7;
            padding: 0.85rem 1rem;
            cursor: pointer;
        }
        .log-row:hover { background: #f8f9fa; }
        .log-row.expanded { background: #f1f5f9; }
        .log-detail {
            display: none;
            background: #0b1220;
            color: #d8e2ef;
            padding: 0.85rem 1rem;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .log-row.expanded + .log-detail { display: block; }
        .badge-agent { background: #cfe2ff; color: #084298; }
        .badge-llm { background: #d1e7dd; color: #0f5132; }
        .badge-task { background: #fff3cd; color: #664d03; }
        .badge-system { background: #e2e3e5; color: #41464b; }
        .filters .form-label { font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container-fluid px-4">
        <div class="page-header d-flex flex-wrap align-items-center justify-content-between gap-3">
            <div>
                <h1 class="h3 mb-1"><i class="fas fa-terminal me-2"></i>Developer Logs</h1>
                <p class="mb-0 opacity-75">Agent runs, LLM conversations, and background task events.</p>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="{{ url_for('app_settings') }}" class="btn btn-outline-light btn-sm">Settings</a>
                <a href="{{ url_for('index') }}" class="btn btn-light btn-sm">Dashboard</a>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body filters">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label" for="searchInput">Search</label>
                        <input type="search" class="form-control" id="searchInput" placeholder="Message, event, agent, JSON data…">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" for="categoryFilter">Category</label>
                        <select class="form-select" id="categoryFilter">
                            <option value="">All categories</option>
                            {% for cat in categories %}
                                <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" for="agentFilter">Agent</label>
                        <select class="form-select" id="agentFilter">
                            <option value="">All agents</option>
                            {% for name in agents %}
                                <option value="{{ name }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label" for="taskFilter">Task ID</label>
                        <input type="text" class="form-control font-monospace" id="taskFilter" placeholder="Optional">
                    </div>
                    <div class="col-md-2">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="autoRefresh" checked>
                            <label class="form-check-label" for="autoRefresh">Auto-refresh</label>
                        </div>
                        <button type="button" class="btn btn-primary w-100" id="refreshBtn">
                            <i class="fas fa-sync-alt me-1"></i>Refresh
                        </button>
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-2 mt-3">
                    <a href="#" class="btn btn-outline-secondary btn-sm" id="downloadJsonBtn">
                        <i class="fas fa-download me-1"></i>Download JSON
                    </a>
                    <a href="#" class="btn btn-outline-secondary btn-sm" id="downloadTxtBtn">
                        <i class="fas fa-file-alt me-1"></i>Download TXT
                    </a>
                    <button type="button" class="btn btn-outline-danger btn-sm" id="clearFilteredBtn">
                        <i class="fas fa-eraser me-1"></i>Clear filtered
                    </button>
                    <button type="button" class="btn btn-outline-danger btn-sm" id="clearAllBtn">
                        <i class="fas fa-trash me-1"></i>Clear all
                    </button>
                    <span class="align-self-center text-muted small ms-auto" id="logCountLabel">{{ total_logs }} entries</span>
                </div>
            </div>
        </div>

        <div class="log-table-wrap" id="logTable">
            <div class="text-center text-muted py-5" id="emptyState">Loading logs…</div>
        </div>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const searchInput = document.getElementById('searchInput');
            const categoryFilter = document.getElementById('categoryFilter');
            const agentFilter = document.getElementById('agentFilter');
            const taskFilter = document.getElementById('taskFilter');
            const logTable = document.getElementById('logTable');
            const emptyState = document.getElementById('emptyState');
            const logCountLabel = document.getElementById('logCountLabel');
            const autoRefresh = document.getElementById('autoRefresh');
            let refreshTimer = null;
            let searchTimer = null;

            if (params.get('task_id')) taskFilter.value = params.get('task_id');
            if (params.get('category')) categoryFilter.value = params.get('category');

            function queryParams() {
                const q = new URLSearchParams();
                if (searchInput.value.trim()) q.set('search', searchInput.value.trim());
                if (categoryFilter.value) q.set('category', categoryFilter.value);
                if (agentFilter.value) q.set('agent', agentFilter.value);
                if (taskFilter.value.trim()) q.set('task_id', taskFilter.value.trim());
                q.set('limit', '300');
                return q;
            }

            function badgeClass(category) {
                return 'badge badge-' + (category || 'system');
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            function renderLogs(logs) {
                if (!logs.length) {
                    logTable.innerHTML = '<div class="text-center text-muted py-5">No logs match your filters.</div>';
                    return;
                }
                const parts = [];
                logs.forEach(function (entry) {
                    const title = [entry.agent, entry.event].filter(Boolean).join(' · ') || entry.category;
                    const preview = entry.event === 'conversation' && entry.data && entry.data.messages
                        ? entry.data.messages.map(function (m) { return m.role + ': ' + m.content.slice(0, 120); }).join(' · ')
                        : (entry.message || '');
                    parts.push(
                        '<div class="log-row" data-id="' + entry.id + '">' +
                            '<div class="d-flex flex-wrap align-items-center gap-2">' +
                                '<span class="badge ' + badgeClass(entry.category) + '">' + escapeHtml(entry.category) + '</span>' +
                                '<strong class="small">' + escapeHtml(title) + '</strong>' +
                                '<span class="text-muted small ms-auto">' + escapeHtml(entry.created_at || '') + '</span>' +
                            '</div>' +
                            '<div class="small text-muted mt-1">' + escapeHtml(preview) + '</div>' +
                        '</div>' +
                        '<div class="log-detail">' + escapeHtml(JSON.stringify(entry, null, 2)) + '</div>'
                    );
                });
                logTable.innerHTML = parts.join('');
                logTable.querySelectorAll('.log-row').forEach(function (row) {
                    row.addEventListener('click', function () {
                        row.classList.toggle('expanded');
                    });
                });
            }

            async function loadLogs() {
                try {
                    const response = await fetch('/api/dev/logs?' + queryParams().toString());
                    if (!response.ok) throw new Error('Failed to load logs');
                    const payload = await response.json();
                    renderLogs(payload.logs || []);
                    logCountLabel.textContent = (payload.total || 0) + ' entries';
                } catch (err) {
                    logTable.innerHTML = '<div class="text-center text-danger py-5">Could not load logs.</div>';
                }
            }

            function scheduleRefresh() {
                if (refreshTimer) clearInterval(refreshTimer);
                if (autoRefresh.checked) {
                    refreshTimer = setInterval(loadLogs, 3000);
                }
            }

            function updateDownloadLinks() {
                const q = queryParams();
                document.getElementById('downloadJsonBtn').href = '/api/dev/logs/download?' + q.toString();
                const txt = new URLSearchParams(q);
                txt.set('format', 'txt');
                document.getElementById('downloadTxtBtn').href = '/api/dev/logs/download?' + txt.toString();
            }

            async function clearLogs(all) {
                const body = all ? {} : {
                    category: categoryFilter.value || undefined,
                    task_id: taskFilter.value.trim() || undefined,
                };
                const label = all ? 'all developer logs' : 'logs matching the current filters';
                if (!window.confirm('Delete ' + label + '?')) return;
                await fetch('/api/dev/logs', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                loadLogs();
            }

            document.getElementById('refreshBtn').addEventListener('click', loadLogs);
            document.getElementById('clearAllBtn').addEventListener('click', function () { clearLogs(true); });
            document.getElementById('clearFilteredBtn').addEventListener('click', function () { clearLogs(false); });
            [categoryFilter, agentFilter, taskFilter].forEach(function (el) {
                el.addEventListener('change', function () {
                    updateDownloadLinks();
                    loadLogs();
                });
            });
            searchInput.addEventListener('input', function () {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(function () {
                    updateDownloadLinks();
                    loadLogs();
                }, 350);
            });
            autoRefresh.addEventListener('change', scheduleRefresh);

            updateDownloadLinks();
            loadLogs();
            scheduleRefresh();
        })();
    </script>
</body>
</html>

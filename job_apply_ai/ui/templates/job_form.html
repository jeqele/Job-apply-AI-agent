<!DOCTYPE html>
<html>
<head>
    <title>{% if job %}Edit Job{% else %}Add Job{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding-top: 30px;
            padding-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .card-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
            color: white;
            font-weight: 600;
            padding: 1.25rem;
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold mb-0">
                {% if job %}<i class="fas fa-edit me-2"></i>Edit Job{% else %}<i class="fas fa-plus me-2"></i>Add Job{% endif %}
            </h1>
            <a href="{{ url_for('manage_jobs') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Jobs
            </a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show mb-4" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Job Details</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="title">Title *</label>
                            <input class="form-control" id="title" name="title" value="{{ job.title if job else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="company">Company</label>
                            <input class="form-control" id="company" name="company" value="{{ job.company if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="location">Location</label>
                            <input class="form-control" id="location" name="location" value="{{ job.location if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="work_type">Work Type</label>
                            <input class="form-control" id="work_type" name="work_type" value="{{ job.work_type if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="salary">Salary</label>
                            <input class="form-control" id="salary" name="salary" value="{{ job.salary if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="employment_type">Employment Type</label>
                            <input class="form-control" id="employment_type" name="employment_type" value="{{ job.employment_type if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="seniority_level">Seniority Level</label>
                            <input class="form-control" id="seniority_level" name="seniority_level" value="{{ job.seniority_level if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="source">Source</label>
                            <input class="form-control" id="source" name="source" value="{{ job.source if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="emails">Emails</label>
                            <input class="form-control" id="emails" name="emails" value="{{ job.emails if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="link">Job Link</label>
                            <input class="form-control" id="link" name="link" value="{{ job.link if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="visa_sponsorship">Visa Sponsorship</label>
                            <input class="form-control" id="visa_sponsorship" name="visa_sponsorship" value="{{ job.visa_sponsorship if job else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="relocation_support">Relocation Support</label>
                            <input class="form-control" id="relocation_support" name="relocation_support" value="{{ job.relocation_support if job else '' }}">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label" for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="8">{{ job.description if job else '' }}</textarea>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Save Job
                        </button>
                        <a href="{{ url_for('manage_jobs') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

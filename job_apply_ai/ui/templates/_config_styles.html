<style>
    :root {
        --hh-navy: #0f172a;
        --hh-navy-soft: #1e293b;
        --hh-primary: #1e40af;
        --hh-primary-hover: #1e3a8a;
        --hh-accent: #2563eb;
        --hh-accent-subtle: #eff6ff;
        --hh-surface: #ffffff;
        --hh-surface-raised: #f8fafc;
        --hh-surface-muted: #f1f5f9;
        --hh-border: #e2e8f0;
        --hh-border-strong: #cbd5e1;
        --hh-text: #0f172a;
        --hh-text-secondary: #475569;
        --hh-text-muted: #64748b;
        --hh-success: #047857;
        --hh-success-bg: #ecfdf5;
        --hh-warning: #b45309;
        --hh-warning-bg: #fffbeb;
        --hh-danger: #b91c1c;
        --hh-danger-bg: #fef2f2;
        --hh-radius-sm: 0.375rem;
        --hh-radius: 0.5rem;
        --hh-radius-lg: 0.75rem;
        --hh-shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
        --hh-shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
        --hh-shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
        --hh-font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --hh-nav-height: 3.5rem;

        /* Legacy aliases used in partials */
        --brand-primary: var(--hh-primary);
        --brand-secondary: var(--hh-accent);
        --surface-muted: var(--hh-surface-raised);
        --text-muted: var(--hh-text-muted);
        --border-subtle: var(--hh-border);
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
    }

    body {
        font-family: var(--hh-font);
        background-color: var(--hh-surface-raised);
        color: var(--hh-text);
        font-size: 0.9375rem;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding-bottom: 3rem;
    }

    body.has-save-bar {
        padding-bottom: 5.5rem;
    }

    h1, h2, h3, h4, h5, h6 {
        color: var(--hh-text);
        letter-spacing: -0.02em;
    }

    a {
        color: var(--hh-primary);
    }

    a:hover {
        color: var(--hh-primary-hover);
    }

    /* ── Navigation ─────────────────────────────────────── */

    .top-nav {
        background: var(--hh-surface);
        border-bottom: 1px solid var(--hh-border);
        position: sticky;
        top: 0;
        z-index: 1030;
        height: var(--hh-nav-height);
    }

    .top-nav .container,
    .top-nav .container-fluid {
        height: 100%;
    }

    .top-nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        height: 100%;
    }

    .brand-link {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-width: 0;
        text-decoration: none;
        color: var(--hh-text);
    }

    .brand-link:hover {
        color: var(--hh-text);
    }

    .brand-mark {
        width: 2rem;
        height: 2rem;
        border-radius: var(--hh-radius-sm);
        background: var(--hh-navy);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.85rem;
        flex-shrink: 0;
    }

    .brand-title {
        font-weight: 600;
        font-size: 0.95rem;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .brand-subtitle {
        font-size: 0.72rem;
        color: var(--hh-text-muted);
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        flex-shrink: 0;
    }

    .nav-link-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.75rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--hh-text-secondary);
        text-decoration: none;
        border-radius: var(--hh-radius-sm);
        border: 1px solid transparent;
        transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
        white-space: nowrap;
    }

    .nav-link-btn:hover {
        background: var(--hh-surface-muted);
        color: var(--hh-text);
    }

    .nav-link-btn.active {
        background: var(--hh-accent-subtle);
        color: var(--hh-primary);
        border-color: #bfdbfe;
    }

    .nav-link-btn i {
        font-size: 0.8rem;
        opacity: 0.85;
    }

    /* ── Layout ─────────────────────────────────────────── */

    .config-page {
        max-width: 960px;
    }

    .page-shell {
        max-width: 1200px;
    }

    .page-shell-wide {
        max-width: 1400px;
    }

    .page-intro {
        margin-bottom: 1.5rem;
    }

    .page-intro h1 {
        font-size: clamp(1.25rem, 2.5vw, 1.625rem);
        font-weight: 600;
        margin-bottom: 0.35rem;
    }

    .page-intro p {
        color: var(--hh-text-muted);
        margin-bottom: 0;
        font-size: 0.9rem;
        max-width: 42rem;
    }

    .page-header-bar {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        padding: 1.25rem 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--hh-shadow-sm);
    }

    .page-header-bar h1 {
        font-size: 1.375rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
    }

    .page-header-bar .lead {
        font-size: 0.9rem;
        color: var(--hh-text-muted);
        margin-bottom: 0;
    }

    .page-header-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
    }

    /* ── Cards & sections ───────────────────────────────── */

    .section-card,
    .hh-card {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        margin-bottom: 1rem;
        overflow: hidden;
        box-shadow: var(--hh-shadow-sm);
    }

    .section-card-header,
    .hh-card-header {
        padding: 0.85rem 1.15rem;
        border-bottom: 1px solid var(--hh-border);
        font-weight: 600;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        background: var(--hh-surface);
        color: var(--hh-text);
    }

    .section-card-body,
    .hh-card-body {
        padding: 1.15rem;
    }

    .section-lead {
        font-size: 0.875rem;
        color: var(--hh-text-muted);
        margin-bottom: 1rem;
    }

    .hh-panel {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        box-shadow: var(--hh-shadow-sm);
    }

    /* ── Dashboard (home) ───────────────────────────────── */

    .dashboard-hero {
        margin-bottom: 1.5rem;
    }

    .dashboard-hero h1 {
        font-size: clamp(1.35rem, 3vw, 1.75rem);
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .dashboard-hero .lead {
        color: var(--hh-text-muted);
        font-size: 0.95rem;
        max-width: 40rem;
        margin-bottom: 1rem;
    }

    .feature-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
    }

    .feature-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--hh-text-secondary);
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: 999px;
        padding: 0.25rem 0.65rem;
    }

    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
        .kpi-grid {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    .kpi-card {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        padding: 1rem 1.1rem;
        box-shadow: var(--hh-shadow-sm);
        border-left: 3px solid var(--hh-border-strong);
    }

    .kpi-card.accent-primary { border-left-color: var(--hh-primary); }
    .kpi-card.accent-success { border-left-color: var(--hh-success); }
    .kpi-card.accent-info { border-left-color: #0284c7; }
    .kpi-card.accent-warning { border-left-color: var(--hh-warning); }

    .kpi-value {
        font-size: 1.5rem;
        font-weight: 700;
        line-height: 1.1;
        font-variant-numeric: tabular-nums;
        color: var(--hh-text);
    }

    .kpi-label {
        font-size: 0.75rem;
        color: var(--hh-text-muted);
        margin-top: 0.2rem;
        font-weight: 500;
    }

    .quick-nav-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }

    @media (min-width: 576px) {
        .quick-nav-grid {
            grid-template-columns: repeat(5, 1fr);
        }
    }

    .quick-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0.4rem;
        padding: 0.85rem 0.5rem;
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius);
        color: var(--hh-text-secondary);
        text-decoration: none;
        font-size: 0.75rem;
        font-weight: 500;
        transition: border-color 0.12s, color 0.12s, box-shadow 0.12s;
        min-height: 4.75rem;
        justify-content: center;
    }

    .quick-nav-item:hover {
        border-color: var(--hh-border-strong);
        color: var(--hh-primary);
        box-shadow: var(--hh-shadow);
    }

    .quick-nav-item i {
        font-size: 1rem;
        color: var(--hh-text-muted);
    }

    .quick-nav-item:hover i {
        color: var(--hh-primary);
    }

    .setup-checklist .setup-item {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--hh-border);
    }

    .setup-checklist .setup-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    .setup-status {
        width: 1.5rem;
        height: 1.5rem;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 0.65rem;
        border: 1px solid var(--hh-border);
        background: var(--hh-surface-muted);
        color: var(--hh-text-muted);
    }

    .setup-status.done {
        background: var(--hh-success-bg);
        border-color: #a7f3d0;
        color: var(--hh-success);
    }

    .setup-status.pending {
        background: var(--hh-warning-bg);
        border-color: #fde68a;
        color: var(--hh-warning);
    }

    .status-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
    }

    .status-chip {
        font-size: 0.72rem;
        padding: 0.2rem 0.5rem;
        border-radius: var(--hh-radius-sm);
        background: var(--hh-surface-muted);
        color: var(--hh-text-secondary);
        border: 1px solid var(--hh-border);
    }

    .status-chip strong {
        color: var(--hh-text);
        font-weight: 600;
    }

    .workflow-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
    }

    @media (min-width: 768px) {
        .workflow-grid {
            grid-template-columns: repeat(4, 1fr);
        }
    }

    .workflow-step {
        display: flex;
        gap: 0.65rem;
        align-items: flex-start;
    }

    .step-number {
        width: 1.5rem;
        height: 1.5rem;
        background: var(--hh-navy);
        color: #fff;
        border-radius: var(--hh-radius-sm);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 600;
        flex-shrink: 0;
    }

    /* ── Forms & buttons ────────────────────────────────── */

    .form-label {
        font-weight: 500;
        font-size: 0.8125rem;
        color: var(--hh-text-secondary);
        margin-bottom: 0.35rem;
    }

    .form-control,
    .form-select {
        border-radius: var(--hh-radius-sm);
        border-color: var(--hh-border-strong);
        font-size: 0.875rem;
        padding: 0.5rem 0.75rem;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: var(--hh-accent);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .field-hint,
    .form-text {
        font-size: 0.78rem;
        color: var(--hh-text-muted);
        margin-top: 0.25rem;
    }

    .btn {
        font-weight: 500;
        font-size: 0.875rem;
        border-radius: var(--hh-radius-sm);
    }

    .btn-primary {
        background-color: var(--hh-primary);
        border-color: var(--hh-primary);
    }

    .btn-primary:hover,
    .btn-primary:focus {
        background-color: var(--hh-primary-hover);
        border-color: var(--hh-primary-hover);
    }

    .btn-brand,
    .btn-outline-brand {
        /* Legacy home page buttons */
    }

    .btn-brand {
        background: var(--hh-primary);
        border: 1px solid var(--hh-primary);
        color: #fff;
        font-weight: 500;
    }

    .btn-brand:hover {
        background: var(--hh-primary-hover);
        border-color: var(--hh-primary-hover);
        color: #fff;
    }

    .btn-ghost {
        background: transparent;
        border: 1px solid var(--hh-border);
        color: var(--hh-text-secondary);
    }

    .btn-ghost:hover {
        background: var(--hh-surface-muted);
        border-color: var(--hh-border-strong);
        color: var(--hh-text);
    }

    /* ── Tabs ───────────────────────────────────────────── */

    .config-tabs {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius);
        padding: 0.25rem;
        gap: 0.15rem;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        position: sticky;
        top: var(--hh-nav-height);
        z-index: 1020;
        margin-bottom: 1.25rem;
        box-shadow: var(--hh-shadow-sm);
    }

    .config-tabs::-webkit-scrollbar {
        display: none;
    }

    .config-tabs .nav-link {
        border-radius: var(--hh-radius-sm);
        color: var(--hh-text-secondary);
        font-size: 0.8125rem;
        font-weight: 500;
        padding: 0.45rem 0.8rem;
        white-space: nowrap;
        border: none;
    }

    .config-tabs .nav-link:hover {
        background: var(--hh-surface-muted);
        color: var(--hh-text);
    }

    .config-tabs .nav-link.active {
        background: var(--hh-navy);
        color: #fff;
    }

    .nav-tabs {
        border-bottom-color: var(--hh-border);
    }

    .nav-tabs .nav-link {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--hh-text-muted);
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        padding: 0.5rem 0.85rem;
    }

    .nav-tabs .nav-link:hover {
        color: var(--hh-text);
        border-bottom-color: var(--hh-border-strong);
    }

    .nav-tabs .nav-link.active {
        color: var(--hh-primary);
        background: transparent;
        border-bottom-color: var(--hh-primary);
    }

    .tab-panel {
        display: none;
    }

    .tab-panel.active {
        display: block;
    }

    /* ── Settings ───────────────────────────────────────── */

    .settings-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
    }

    @media (min-width: 992px) {
        .settings-layout {
            grid-template-columns: 200px 1fr;
            align-items: start;
        }
    }

    .settings-sidebar {
        background: var(--hh-surface);
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        padding: 0.4rem;
        position: sticky;
        top: calc(var(--hh-nav-height) + 0.75rem);
        box-shadow: var(--hh-shadow-sm);
    }

    .settings-sidebar .nav-link {
        border-radius: var(--hh-radius-sm);
        color: var(--hh-text-secondary);
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.55rem 0.8rem;
        text-align: left;
        border: none;
    }

    .settings-sidebar .nav-link:hover {
        background: var(--hh-surface-muted);
        color: var(--hh-text);
    }

    .settings-sidebar .nav-link.active {
        background: var(--hh-accent-subtle);
        color: var(--hh-primary);
    }

    .config-save-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(8px);
        border-top: 1px solid var(--hh-border);
        padding: 0.75rem 0;
        z-index: 1040;
        box-shadow: 0 -2px 8px rgba(15, 23, 42, 0.04);
    }

    /* ── Status pills ───────────────────────────────────── */

    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.75rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-weight: 500;
        border: 1px solid transparent;
    }

    .status-pill.online {
        background: var(--hh-success-bg);
        color: var(--hh-success);
        border-color: #a7f3d0;
    }

    .status-pill.offline {
        background: var(--hh-danger-bg);
        color: var(--hh-danger);
        border-color: #fecaca;
    }

    .status-pill i {
        font-size: 0.4rem;
    }

    .review-banner {
        border-left: 3px solid var(--hh-primary);
        background: var(--hh-accent-subtle);
        border-radius: var(--hh-radius-sm);
        padding: 0.85rem 1rem;
        margin-bottom: 1rem;
        font-size: 0.875rem;
    }

    .provider-panel.d-none {
        display: none !important;
    }

    .model-chip {
        font-size: 0.75rem;
        padding: 0.15rem 0.5rem;
    }

    .collapse-toggle {
        font-size: 0.8125rem;
        color: var(--hh-primary);
        text-decoration: none;
        cursor: pointer;
    }

    .collapse-toggle:hover {
        text-decoration: underline;
    }

    /* ── Manage jobs ────────────────────────────────────── */

    .layout-card {
        border: 1px solid var(--hh-border);
        border-radius: var(--hh-radius-lg);
        box-shadow: var(--hh-shadow-sm);
        overflow: hidden;
        background: var(--hh-surface);
    }

    .folder-sidebar {
        background: var(--hh-surface);
        border-right: 1px solid var(--hh-border);
        min-height: 520px;
    }

    .folder-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.55rem 0.85rem;
        color: var(--hh-text-secondary);
        text-decoration: none;
        border-left: 2px solid transparent;
        font-size: 0.8125rem;
        transition: background 0.1s ease, color 0.1s ease;
    }

    .folder-link:hover {
        background: var(--hh-surface-muted);
        color: var(--hh-text);
    }

    .folder-link.active {
        background: var(--hh-accent-subtle);
        color: var(--hh-primary);
        border-left-color: var(--hh-primary);
        font-weight: 600;
    }

    .folder-link .folder-label {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 0;
    }

    .folder-link .folder-label span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .folder-count {
        font-size: 0.7rem;
        min-width: 1.5rem;
        text-align: center;
        font-variant-numeric: tabular-nums;
    }

    .folder-section-title {
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--hh-text-muted);
        padding: 0.85rem 0.85rem 0.3rem;
        font-weight: 600;
    }

    .job-list-area {
        padding: 1rem;
        background: var(--hh-surface-raised);
        min-height: 520px;
    }

    .job-empty-state {
        text-align: center;
        color: var(--hh-text-muted);
        padding: 3rem 1.5rem;
        font-size: 0.9rem;
    }

    /* ── Alerts & flashes ───────────────────────────────── */

    .hh-flash {
        margin-bottom: 1rem;
        font-size: 0.875rem;
        border-radius: var(--hh-radius-sm);
    }

    .alert-info {
        background: var(--hh-accent-subtle);
        border-color: #bfdbfe;
        color: #1e3a8a;
    }

    /* ── Footer ─────────────────────────────────────────── */

    .hh-footer {
        margin-top: 2.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--hh-border);
        text-align: center;
    }

    .hh-footer-text {
        font-size: 0.75rem;
        color: var(--hh-text-muted);
        margin: 0;
    }

    /* ── Error pages ────────────────────────────────────── */

    .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: var(--hh-surface-raised);
    }

    .error-panel {
        text-align: center;
        max-width: 28rem;
    }

    .error-code {
        font-size: 4rem;
        font-weight: 700;
        color: var(--hh-text);
        line-height: 1;

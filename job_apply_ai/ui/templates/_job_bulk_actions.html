{# Bulk selection toolbar for job lists. Set return_view to "list" or "manage". #}
{% set bulk_return_view = return_view|default('manage') %}
<div id="job-bulk-toolbar" class="card border-primary mb-3 d-none">
    <div class="card-body py-2">
        <form method="post"
              action="{{ url_for('batch_update_job_status') }}"
              id="job-bulk-form"
              class="d-flex flex-wrap align-items-center gap-3">
            <input type="hidden" name="return_view" value="{{ bulk_return_view }}">
            {% if bulk_return_view == 'manage' %}
                <input type="hidden" name="return_folder" value="{{ current_folder|default('all') }}">
                <input type="hidden" name="return_search" value="{{ search_query|default('') }}">
                {% if sort_query %}
                    <input type="hidden" name="return_sort" value="{{ sort_query }}">
                {% endif %}
            {% elif sort_query %}
                <input type="hidden" name="return_sort" value="{{ sort_query }}">
            {% endif %}
            <span class="text-muted small text-nowrap">
                <strong id="job-bulk-count">0</strong> selected
            </span>
            <label class="text-muted small text-nowrap mb-0" for="bulk-workflow-status">Move to</label>
            <select id="bulk-workflow-status"
                    name="workflow_status"
                    class="form-select form-select-sm"
                    style="min-width: 200px;"
                    required
                    aria-label="Move selected jobs to folder">
                {% for status in job_statuses %}
                    <option value="{{ status }}">{{ status_labels[status] }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary btn-sm" id="job-bulk-submit" disabled>
                <i class="fas fa-folder-open me-1"></i>Apply
            </button>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="job-bulk-clear">
                Clear selection
            </button>
        </form>
    </div>
</div>

<script>
    (function () {
        const toolbar = document.getElementById('job-bulk-toolbar');
        const form = document.getElementById('job-bulk-form');
        const countEl = document.getElementById('job-bulk-count');
        const submitBtn = document.getElementById('job-bulk-submit');
        const clearBtn = document.getElementById('job-bulk-clear');
        const selectAll = document.getElementById('job-select-all');
        const checkboxes = () => Array.from(document.querySelectorAll('.job-select-checkbox'));

        function selectedBoxes() {
            return checkboxes().filter((box) => box.checked);
        }

        function syncToolbar() {
            const selected = selectedBoxes();
            const count = selected.length;
            countEl.textContent = String(count);
            toolbar.classList.toggle('d-none', count === 0);
            submitBtn.disabled = count === 0;

            form.querySelectorAll('input[name="job_ids"]').forEach((input) => input.remove());
            selected.forEach((box) => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'job_ids';
                input.value = box.value;
                form.appendChild(input);
            });

            if (selectAll) {
                const boxes = checkboxes();
                selectAll.checked = boxes.length > 0 && selected.length === boxes.length;
                selectAll.indeterminate = selected.length > 0 && selected.length < boxes.length;
            }
        }

        checkboxes().forEach((box) => box.addEventListener('change', syncToolbar));

        if (selectAll) {
            selectAll.addEventListener('change', () => {
                checkboxes().forEach((box) => {
                    box.checked = selectAll.checked;
                });
                syncToolbar();
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                checkboxes().forEach((box) => {
                    box.checked = false;
                });
                syncToolbar();
            });
        }

        if (form) {
            form.addEventListener('submit', (event) => {
                if (selectedBoxes().length === 0) {
                    event.preventDefault();
                    return;
                }
                const statusLabel = form.querySelector('#bulk-workflow-status option:checked')?.textContent || 'folder';
                if (!confirm(`Move ${selectedBoxes().length} job(s) to ${statusLabel}?`)) {
                    event.preventDefault();
                }
            });
        }

        syncToolbar();
    })();
</script>

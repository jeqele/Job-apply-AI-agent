<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1220;
            min-height: 100vh;
        }
        .progress-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .progress-card {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }
        .progress-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0099ff 100%);
            color: white;
            padding: 1.75rem 2rem;
        }
        .progress-body { padding: 2rem; }
        .progress-bar-wrap {
            height: 12px;
            background: #e9ecef;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0d6efd, #20c997);
            transition: width 0.45s ease;
        }
    </style>
</head>
<body>
    <div class="progress-shell">
        <div class="progress-card">
            <div class="progress-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="fs-2"><i class="fas fa-search"></i></div>
                    <div>
                        <h1 class="h3 mb-1">Job search</h1>
                        <p class="mb-0 opacity-75">
                            {% if keyword and location %}
                                {{ keyword }} in {{ location }}
                            {% else %}
                                Searching job boards…
                            {% endif %}
                        </p>
                    </div>
                </div>
            </div>
            <div class="progress-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong id="progress-label">Starting…</strong>
                    <span id="progress-percent" class="text-muted">0%</span>
                </div>
                <div class="progress-bar-wrap mb-3">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <p id="progress-message" class="text-muted mb-0">Connecting to job sources…</p>
                <div id="error-panel" class="alert alert-danger mt-4 d-none" role="alert"></div>
                {% include '_batch_flow_controls.html' %}
                <div class="mt-4">
                    <a href="{{ back_url }}" class="btn btn-outline-secondary">{{ back_label }}</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const statusUrl = {{ status_url|tojson }};
        const completeUrl = {{ complete_url|tojson }};
        let pollTimer = null;

        function updateUi(data) {
            document.getElementById('progress-label').textContent = data.message || 'Working…';
            document.getElementById('progress-message').textContent = data.message || '';
            document.getElementById('progress-percent').textContent = `${data.percent || 0}%`;
            document.getElementById('progress-bar').style.width = `${data.percent || 0}%`;

            if (data.meta && data.meta.keyword && data.meta.location) {
                document.getElementById('progress-message').textContent =
                    `${data.message} — ${data.meta.keyword} in ${data.meta.location}`;
            }

            if (window.updateBatchFlowControls) {
                window.updateBatchFlowControls(data);
            }
        }
        window.updateBatchFlowUi = updateUi;

        async function pollStatus() {
            const response = await fetch(statusUrl);
            if (response.status === 404) {
                clearInterval(pollTimer);
                showError('Job search session was lost. Please try again.');
                return;
            }

            const data = await response.json();
            updateUi(data);

            if (data.status === 'complete') {
                clearInterval(pollTimer);
                window.location.href = completeUrl;
                return;
            }

            if (data.status === 'error') {
                clearInterval(pollTimer);
                showError(data.error || data.message || 'Job search failed.');
            }
        }

        function showError(message) {
            const panel = document.getElementById('error-panel');
            panel.textContent = message;
            panel.classList.remove('d-none');
        }

        pollTimer = setInterval(pollStatus, 900);
        pollStatus();
    </script>
    {% include '_dev_log_panel.html' %}
</body>
</html>

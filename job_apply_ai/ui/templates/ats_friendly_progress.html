<!DOCTYPE html>
<html>
<head>
    <title>ATS Friendly Analysis{% if job %} — {{ job.title }}{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1220;
            min-height: 100vh;
            overflow: hidden;
        }
        .progress-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .progress-card {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 1.25rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }
        .progress-header {
            background: linear-gradient(135deg, #198754 0%, #20c997 100%);
            color: white;
            padding: 1.75rem 2rem;
        }
        .progress-body { padding: 2rem; }
        .progress-bar-wrap {
            height: 12px;
            background: #e9ecef;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #198754, #0dcaf0);
            transition: width 0.45s ease;
        }
        .lock-banner {
            background: #d1e7dd;
            border: 1px solid #a3cfbb;
            color: #0f5132;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="progress-shell">
        <div class="progress-card">
            <div class="progress-header">
                <div class="d-flex align-items-center gap-3">
                    <div class="fs-2"><i class="fas fa-file-circle-check"></i></div>
                    <div>
                        <h1 class="h3 mb-1">ATS Friendly Analysis</h1>
                        {% if job %}
                            <p class="mb-0 opacity-75">{{ job.title }} · {{ job.company }}</p>
                        {% endif %}
                    </div>
                </div>
            </div>
            <div class="progress-body">
                <div class="lock-banner mb-4">
                    <i class="fas fa-robot me-2"></i>
                    Hermes Hire is scoring your CV against ATS rules and this job description.
                </div>

                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong id="progress-label">Starting…</strong>
                    <span id="progress-percent" class="text-muted">0%</span>
                </div>
                <div class="progress-bar-wrap mb-2">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <p id="progress-message" class="text-muted mb-0">Initializing…</p>

                <div id="error-panel" class="alert alert-danger mt-4 d-none" role="alert"></div>
            </div>
        </div>
    </div>

    <script>
        const startUrl = {{ start_url|tojson }};
        const statusUrlTemplate = {{ status_url_template|tojson }};
        const completeUrlTemplate = {{ complete_url_template|tojson }};
        const backUrl = {{ back_url|tojson }};
        const releaseUrl = {{ url_for('release_ats_friendly_lock')|tojson }};

        let taskId = null;
        let pollTimer = null;

        function updateUi(data) {
            document.getElementById('progress-label').textContent = data.message || 'Working…';
            document.getElementById('progress-message').textContent = data.message || '';
            document.getElementById('progress-percent').textContent = `${data.percent || 0}%`;
            document.getElementById('progress-bar').style.width = `${data.percent || 0}%`;
        }

        async function pollStatus() {
            if (!taskId) return;
            const response = await fetch(statusUrlTemplate.replace('TASK_ID', taskId));
            if (response.status === 404) {
                clearInterval(pollTimer);
                taskId = null;
                await fetch(releaseUrl, { method: 'POST' });
                const panel = document.getElementById('error-panel');
                panel.textContent = 'ATS analysis session was lost. You can go back and try again.';
                panel.classList.remove('d-none');
                return;
            }
            const data = await response.json();
            updateUi(data);

            if (data.status === 'complete') {
                clearInterval(pollTimer);
                taskId = null;
                window.location.href = completeUrlTemplate.replace('TASK_ID', data.task_id);
                return;
            }

            if (data.status === 'error') {
                clearInterval(pollTimer);
                taskId = null;
                fetch(releaseUrl, { method: 'POST' });
                const panel = document.getElementById('error-panel');
                panel.textContent = data.error || data.message || 'ATS analysis failed.';
                panel.classList.remove('d-none');
            }
        }

        async function startTask() {
            const response = await fetch(startUrl, { method: 'POST' });
            const data = await response.json();
            if (!response.ok) {
                document.getElementById('error-panel').textContent = data.error || 'Could not start ATS analysis.';
                document.getElementById('error-panel').classList.remove('d-none');
                return;
            }
            taskId = data.task_id;
            pollTimer = setInterval(pollStatus, 900);
            pollStatus();
        }

        startTask();
    </script>
</body>
</html>
